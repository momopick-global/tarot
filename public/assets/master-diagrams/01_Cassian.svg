<svg
  width="320"
  height="320"
  viewBox="-10 -10 340 340"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="카시안 성향 레이더 차트"
>
  <defs>
    <radialGradient id="cassianGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9B6BFF" stop-opacity="0.22" />
      <stop offset="60%" stop-color="#9B6BFF" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#9B6BFF" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="cassianGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F6D67A" />
      <stop offset="50%" stop-color="#C99936" />
      <stop offset="100%" stop-color="#F2E4A6" />
    </linearGradient>

    <filter id="cassianSoftGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="cassianPointGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      .radar-label {
        font-family: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
        font-size: 12px;
        font-weight: 700;
        fill: #F5EEDF;
        opacity: 0.92;
        letter-spacing: -0.01em;
      }

      .radar-grid {
        fill: none;
        stroke: url(#cassianGold);
      }

      .radar-axis {
        stroke: url(#cassianGold);
        opacity: 0.22;
        stroke-width: 1.1;
      }

      .radar-orbit {
        transform-origin: 160px 160px;
        animation: slowRotate 24s linear infinite;
      }

      .radar-core {
        transform-origin: 160px 160px;
        animation: corePulse 4s ease-in-out infinite;
      }

      .radar-shape {
        animation: shapePulse 4.2s ease-in-out infinite;
      }

      .radar-point {
        animation: pointPulse 2.8s ease-in-out infinite;
      }

      @keyframes slowRotate {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @keyframes corePulse {
        0% { opacity: 0.42; transform: scale(0.985); }
        50% { opacity: 0.92; transform: scale(1.02); }
        100% { opacity: 0.42; transform: scale(0.985); }
      }

      @keyframes shapePulse {
        0% { opacity: 0.9; }
        50% { opacity: 1; }
        100% { opacity: 0.9; }
      }

      @keyframes pointPulse {
        0%, 100% { opacity: 0.88; }
        50% { opacity: 1; }
      }

      @media (prefers-reduced-motion: reduce) {
        .radar-orbit,
        .radar-core,
        .radar-shape,
        .radar-point {
          animation: none;
        }
      }
    </style>
  </defs>

  <circle
    class="radar-core"
    cx="160"
    cy="160"
    r="108"
    fill="url(#cassianGlow)"
  />

  <g class="radar-orbit">
    <circle
      cx="160"
      cy="160"
      r="124"
      fill="none"
      stroke="url(#cassianGold)"
      stroke-opacity="0.28"
      stroke-width="1.5"
    />
    <circle
      cx="160"
      cy="160"
      r="110"
      fill="none"
      stroke="url(#cassianGold)"
      stroke-opacity="0.14"
      stroke-width="1"
    />

    <line x1="160" y1="24" x2="160" y2="14" stroke="url(#cassianGold)" stroke-width="1.5" />
    <line x1="221" y1="40" x2="226" y2="30" stroke="url(#cassianGold)" stroke-width="1.5" />
    <line x1="269" y1="89" x2="280" y2="86" stroke="url(#cassianGold)" stroke-width="1.5" />
    <line x1="285" y1="160" x2="296" y2="160" stroke="url(#cassianGold)" stroke-width="1.5" />
    <line x1="269" y1="231" x2="280" y2="234" stroke="url(#cassianGold)" stroke-width="1.5" />
    <line x1="221" y1="280" x2="226" y2="290" stroke="url(#cassianGold)" stroke-width="1.5" />
    <line x1="160" y1="296" x2="160" y2="306" stroke="url(#cassianGold)" stroke-width="1.5" />
    <line x1="99" y1="280" x2="94" y2="290" stroke="url(#cassianGold)" stroke-width="1.5" />
    <line x1="51" y1="231" x2="40" y2="234" stroke="url(#cassianGold)" stroke-width="1.5" />
    <line x1="35" y1="160" x2="24" y2="160" stroke="url(#cassianGold)" stroke-width="1.5" />
    <line x1="51" y1="89" x2="40" y2="86" stroke="url(#cassianGold)" stroke-width="1.5" />
    <line x1="99" y1="40" x2="94" y2="30" stroke="url(#cassianGold)" stroke-width="1.5" />
  </g>

  <polygon
    class="radar-grid"
    points="160,78 230,119 230,201 160,242 90,201 90,119"
    stroke-opacity="0.46"
    stroke-width="1.8"
  />
  <polygon
    class="radar-grid"
    points="160,106 207,133 207,187 160,214 113,187 113,133"
    stroke-opacity="0.24"
    stroke-width="1.2"
  />
  <polygon
    class="radar-grid"
    points="160,132 184,146 184,174 160,188 136,174 136,146"
    stroke-opacity="0.14"
    stroke-width="1"
  />

  <line class="radar-axis" x1="160" y1="160" x2="160" y2="78" />
  <line class="radar-axis" x1="160" y1="160" x2="230" y2="119" />
  <line class="radar-axis" x1="160" y1="160" x2="230" y2="201" />
  <line class="radar-axis" x1="160" y1="160" x2="160" y2="242" />
  <line class="radar-axis" x1="160" y1="160" x2="90" y2="201" />
  <line class="radar-axis" x1="160" y1="160" x2="90" y2="119" />

  <polygon
    class="radar-shape"
    points="160,94 230,119 230,201 160,209 132,176 104,127"
    fill="#9B6BFF"
    fill-opacity="0.24"
    stroke="#A56CFF"
    stroke-width="3"
    filter="url(#cassianSoftGlow)"
  />

  <g filter="url(#cassianPointGlow)">
    <circle class="radar-point" cx="160" cy="94" r="7" fill="#9B6BFF" />
    <circle class="radar-point" cx="230" cy="119" r="7" fill="#9B6BFF" />
    <circle class="radar-point" cx="230" cy="201" r="7" fill="#9B6BFF" />
    <circle class="radar-point" cx="160" cy="209" r="7" fill="#9B6BFF" />
    <circle class="radar-point" cx="132" cy="176" r="7" fill="#9B6BFF" />
    <circle class="radar-point" cx="104" cy="127" r="7" fill="#9B6BFF" />
  </g>

  <g stroke="#B78CFF" stroke-opacity="0.45" fill="none">
    <circle cx="160" cy="94" r="12" />
    <circle cx="230" cy="119" r="12" />
    <circle cx="230" cy="201" r="12" />
    <circle cx="160" cy="209" r="12" />
    <circle cx="132" cy="176" r="12" />
    <circle cx="104" cy="127" r="12" />
  </g>

  <circle cx="160" cy="160" r="11" fill="#0F0B1C" stroke="url(#cassianGold)" stroke-width="2.2" />
  <circle cx="160" cy="160" r="4.5" fill="#9B6BFF" />

  <text class="radar-label" x="160" y="8" text-anchor="middle">직관력</text>
  <text class="radar-label" x="292" y="104" text-anchor="start">미래예측</text>
  <text class="radar-label" x="292" y="220" text-anchor="start">신비감</text>
  <text class="radar-label" x="160" y="318" text-anchor="middle">직설화법</text>
  <text class="radar-label" x="28" y="220" text-anchor="end">감성공감</text>
  <text class="radar-label" x="28" y="104" text-anchor="end">현실조언</text>
</svg>
