<svg
  width="320"
  height="320"
  viewBox="-40 -20 400 360"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="모르가나 성향 레이더 차트"
>
  <defs>
    <radialGradient id="morganaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5A2A9C" stop-opacity="0.20" />
      <stop offset="60%" stop-color="#5A2A9C" stop-opacity="0.07" />
      <stop offset="100%" stop-color="#5A2A9C" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="morganaGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F6D67A" />
      <stop offset="50%" stop-color="#C99936" />
      <stop offset="100%" stop-color="#F2E4A6" />
    </linearGradient>

    <filter id="morganaSoftGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="morganaPointGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      .radar-label {
        font-family: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
        font-size: 12px;
        font-weight: 700;
        fill: #F5EEDF;
        opacity: 0.92;
        letter-spacing: -0.01em;
      }

      .radar-grid {
        fill: none;
        stroke: url(#morganaGold);
      }

      .radar-axis {
        stroke: url(#morganaGold);
        opacity: 0.22;
        stroke-width: 1.1;
      }

      .radar-orbit {
        transform-origin: 160px 160px;
        animation: slowRotate 32s linear infinite;
      }

      .radar-core {
        transform-origin: 160px 160px;
        animation: corePulse 4s ease-in-out infinite;
      }

      .radar-shape {
        transform-origin: 160px 160px;
        animation:
          shapeIntro 1.25s ease-out 1,
          shapePulse 4.8s ease-in-out 1.25s infinite;
      }

      .radar-point {
        animation:
          pointIntro 0.9s ease-out 1,
          pointPulse 3.6s ease-in-out infinite;
        transform-origin: center;
      }

      .point-ring {
        animation: ringPulse 3.6s ease-in-out infinite;
      }

      .p1 { animation-delay: 0s, 0.15s; }
      .p2 { animation-delay: 0.08s, 0.55s; }
      .p3 { animation-delay: 0.16s, 0.95s; }
      .p4 { animation-delay: 0.24s, 1.35s; }
      .p5 { animation-delay: 0.32s, 1.75s; }
      .p6 { animation-delay: 0.40s, 2.15s; }

      @keyframes slowRotate {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @keyframes corePulse {
        0% { opacity: 0.42; transform: scale(0.985); }
        50% { opacity: 0.92; transform: scale(1.02); }
        100% { opacity: 0.42; transform: scale(0.985); }
      }

      @keyframes shapeIntro {
        0% {
          opacity: 0;
          transform: scale(0.94);
          stroke-dasharray: 620;
          stroke-dashoffset: 620;
        }
        60% {
          opacity: 1;
          transform: scale(1.012);
          stroke-dasharray: 620;
          stroke-dashoffset: 0;
        }
        100% {
          opacity: 1;
          transform: scale(1);
          stroke-dasharray: none;
          stroke-dashoffset: 0;
        }
      }

      @keyframes shapePulse {
        0%, 100% {
          opacity: 0.9;
          transform: scale(1);
          filter: url(#morganaSoftGlow);
        }
        50% {
          opacity: 1;
          transform: scale(1.015);
          filter: url(#morganaSoftGlow);
        }
      }

      @keyframes pointIntro {
        0% {
          opacity: 0;
          transform: scale(0.6);
        }
        100% {
          opacity: 0.96;
          transform: scale(1);
        }
      }

      @keyframes pointPulse {
        0%, 100% {
          opacity: 0.82;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.14);
        }
      }

      @keyframes ringPulse {
        0%, 100% {
          opacity: 0.28;
          transform: scale(1);
        }
        50% {
          opacity: 0.55;
          transform: scale(1.08);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .radar-orbit,
        .radar-core,
        .radar-shape,
        .radar-point,
        .point-ring {
          animation: none;
        }
      }
    </style>
  </defs>

  <circle
    class="radar-core"
    cx="160"
    cy="160"
    r="100"
    fill="url(#morganaGlow)"
  />

  <g class="radar-orbit">
    <circle
      cx="160"
      cy="160"
      r="116"
      fill="none"
      stroke="url(#morganaGold)"
      stroke-opacity="0.28"
      stroke-width="1.5"
    />
    <circle
      cx="160"
      cy="160"
      r="102"
      fill="none"
      stroke="url(#morganaGold)"
      stroke-opacity="0.14"
      stroke-width="1"
    />

    <line x1="160" y1="24" x2="160" y2="14" stroke="url(#morganaGold)" stroke-width="1.5" />
    <line x1="221" y1="40" x2="226" y2="30" stroke="url(#morganaGold)" stroke-width="1.5" />
    <line x1="269" y1="89" x2="280" y2="86" stroke="url(#morganaGold)" stroke-width="1.5" />
    <line x1="285" y1="160" x2="296" y2="160" stroke="url(#morganaGold)" stroke-width="1.5" />
    <line x1="269" y1="231" x2="280" y2="234" stroke="url(#morganaGold)" stroke-width="1.5" />
    <line x1="221" y1="280" x2="226" y2="290" stroke="url(#morganaGold)" stroke-width="1.5" />
    <line x1="160" y1="296" x2="160" y2="306" stroke="url(#morganaGold)" stroke-width="1.5" />
    <line x1="99" y1="280" x2="94" y2="290" stroke="url(#morganaGold)" stroke-width="1.5" />
    <line x1="51" y1="231" x2="40" y2="234" stroke="url(#morganaGold)" stroke-width="1.5" />
    <line x1="35" y1="160" x2="24" y2="160" stroke="url(#morganaGold)" stroke-width="1.5" />
    <line x1="51" y1="89" x2="40" y2="86" stroke="url(#morganaGold)" stroke-width="1.5" />
    <line x1="99" y1="40" x2="94" y2="30" stroke="url(#morganaGold)" stroke-width="1.5" />
  </g>

  <polygon
    class="radar-grid"
    points="160,78 230,119 230,201 160,242 90,201 90,119"
    stroke-opacity="0.46"
    stroke-width="1.8"
  />
  <polygon
    class="radar-grid"
    points="160,106 207,133 207,187 160,214 113,187 113,133"
    stroke-opacity="0.24"
    stroke-width="1.2"
  />
  <polygon
    class="radar-grid"
    points="160,132 184,146 184,174 160,188 136,174 136,146"
    stroke-opacity="0.14"
    stroke-width="1"
  />

  <line class="radar-axis" x1="160" y1="160" x2="160" y2="78" />
  <line class="radar-axis" x1="160" y1="160" x2="230" y2="119" />
  <line class="radar-axis" x1="160" y1="160" x2="230" y2="201" />
  <line class="radar-axis" x1="160" y1="160" x2="160" y2="242" />
  <line class="radar-axis" x1="160" y1="160" x2="90" y2="201" />
  <line class="radar-axis" x1="160" y1="160" x2="90" y2="119" />

  <polygon
    class="radar-shape"
    points="160,78 216,127 216,193 160,242 132,176 104,127"
    fill="#5A2A9C"
    fill-opacity="0.20"
    stroke="#6E44A8"
    stroke-width="3"
    stroke-linejoin="round"
    stroke-linecap="round"
    stroke-dasharray="620"
    stroke-dashoffset="620"
    filter="url(#morganaSoftGlow)"
  />

  <g filter="url(#morganaPointGlow)">
    <circle class="radar-point p1" cx="160" cy="78" r="7" fill="#5A2A9C" />
    <circle class="radar-point p2" cx="216" cy="127" r="7" fill="#5A2A9C" />
    <circle class="radar-point p3" cx="216" cy="193" r="7" fill="#5A2A9C" />
    <circle class="radar-point p4" cx="160" cy="242" r="7" fill="#5A2A9C" />
    <circle class="radar-point p5" cx="132" cy="176" r="7" fill="#5A2A9C" />
    <circle class="radar-point p6" cx="104" cy="127" r="7" fill="#5A2A9C" />
  </g>

  <g stroke="#7850AE" stroke-opacity="0.45" fill="none">
    <circle class="point-ring p1" cx="160" cy="78" r="10" />
    <circle class="point-ring p2" cx="216" cy="127" r="10" />
    <circle class="point-ring p3" cx="216" cy="193" r="10" />
    <circle class="point-ring p4" cx="160" cy="242" r="10" />
    <circle class="point-ring p5" cx="132" cy="176" r="10" />
    <circle class="point-ring p6" cx="104" cy="127" r="10" />
  </g>

  <circle cx="160" cy="160" r="11" fill="#0F0B1C" stroke="url(#morganaGold)" stroke-width="2.2" />
  <circle cx="160" cy="160" r="4.5" fill="#5A2A9C" />

  <text class="radar-label" x="160" y="8" text-anchor="middle">직관력</text>
  <text class="radar-label" x="286" y="100" text-anchor="start">미래예측</text>
  <text class="radar-label" x="286" y="224" text-anchor="start">신비감</text>
  <text class="radar-label" x="160" y="316" text-anchor="middle">직설화법</text>
  <text class="radar-label" x="34" y="224" text-anchor="end">감성공감</text>
  <text class="radar-label" x="34" y="100" text-anchor="end">현실조언</text>
</svg>
